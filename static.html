<!DOCTYPE html>
<html>
<head>
    <title>Static Image Page</title>
</head>
<body>

    <h2>Welcome to My Image Page</h2>

    <img id="myImage" src="nature.jpg" alt="Nature Image"
         width="400" height="250">

    <br><br>

    <button onclick="showMessage()">Click Me</button>

    <script>
        function showMessage() {
            alert("This is a static image displayed on the webpage!");
        }
    </script>

</body>
</html>
